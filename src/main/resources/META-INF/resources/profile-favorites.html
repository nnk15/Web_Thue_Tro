<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng yêu thích | One Room One Love</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="account-page user-profile-page profile-favorites-page">
<header class="listing-header account-top-header">
    <div class="listing-header-inner">
        <a class="listing-brand" href="index.html">
            <img src="assets/img/logo-black.png" alt="ELEVEN">
        </a>

        <form class="listing-search-form" action="rooms.html">
            <input type="search" name="keyword" placeholder="Quận huyện, Đại học hoặc Địa điểm">
            <button type="submit" aria-label="Tìm kiếm">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="m16.5 16.5 4 4"></path></svg>
            </button>
        </form>

        <nav class="listing-header-actions" aria-label="Tiện ích">
            <a class="listing-action-link" href="profile-notifications.html">
                <img class="header-support-icon" src="assets/img/headphones.png" alt="" aria-hidden="true">
                Hỗ trợ
                <svg class="listing-chevron" viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
            </a>
            <a class="listing-action-link" href="#">
                <img class="header-translate-icon" src="assets/img/translate.png" alt="Ngôn ngữ">
                VN
            </a>
            <a class="listing-login" href="login.html">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3h4v18h-4"/><path d="m10 17 5-5-5-5"/><path d="M15 12H3"/></svg>
                Đăng nhập
            </a>
            <div class="home-account-group listing-account-group" hidden>
                <a class="home-user-btn" href="profile.html" aria-label="Tài khoản"></a>
                <a class="home-menu-btn" href="profile.html" aria-label="Menu">
                    <span></span>
                    <span></span>
                </a>
            </div>
        </nav>
    </div>
</header>

<main class="dashboard-shell account-shell">
    <aside class="sidebar account-sidebar">
        <a class="logo" href="index.html">
            <img class="brand-logo-img" src="assets/img/logo.png" alt="One Room. One Love">
        </a>
        <nav class="side-nav">
            <a href="profile.html">Thông tin chi tiết</a>
            <a class="active" href="profile-favorites.html">Phòng yêu thích</a>
            <a href="profile-requests.html">Yêu cầu thuê</a>
            <a href="profile-rented-room.html">Phòng đang thuê</a>
            <a href="profile-notifications.html">Thông báo</a>
            <a href="login.html" data-auth-logout="true">Đăng xuất</a>
        </nav>
    </aside>

    <section class="dashboard-main account-main">
        <div class="dashboard-top">
            <div>
                <h1>Phòng yêu thích</h1>
                <p>Danh sách các phòng bạn đã lưu để theo dõi và xem lại nhanh.</p>
            </div>
            <a class="btn btn-primary" href="rooms.html">Tìm thêm phòng</a>
        </div>

        <section class="data-panel" id="favorites" data-favorites-full>
            <div class="panel-head">
                <h2>Danh sách phòng yêu thích</h2>
            </div>
            <div class="room-grid">
                <div class="empty-state">Đang tải phòng yêu thích...</div>
            </div>
        </section>
    </section>
</main>

<script src="assets/js/auth.js"></script>
<script src="assets/js/tenant-dashboard.js"></script>
</body>
</html>
