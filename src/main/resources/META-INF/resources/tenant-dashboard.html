<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển tới tài khoản | One Room One Love</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <script>
        const routes = {
            "#account-details": "profile.html",
            "#favorites": "profile-favorites.html",
            "#requests": "profile-requests.html",
            "#appointments": "profile-requests.html#appointments",
            "#notifications": "profile-notifications.html"
        };
        const route = routes[window.location.hash] || "profile.html";
        const [path, hash] = route.split("#");
        const target = `${path}${window.location.search}${hash ? `#${hash}` : ""}`;
        window.location.replace(target);
    </script>
</head>
<body class="settings-page">
<main class="settings-main">
    <section class="container settings-container">
        <div class="settings-title">
            <h1>Đang chuyển tới tài khoản của tôi</h1>
            <p><a href="profile.html">Mở trang tài khoản</a></p>
        </div>
    </section>
</main>
</body>
</html>
